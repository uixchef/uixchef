<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" fill="none">
  <title>Sarthak Goyal  Product Designer</title>

  <!-- Typography -->
  <text
    x="50" y="132"
    font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="42"
    font-weight="700"
    letter-spacing="3"
    fill="#E2E8F0"
  >SARTHAK GOYAL</text>

  <line x1="52" y1="150" x2="88" y2="150" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>

  <text
    x="52" y="176"
    font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="14"
    font-weight="400"
    letter-spacing="4"
    fill="#94A3B8"
  >PRODUCT DESIGNER</text>

  <!-- Network pattern  solid connections -->
  <g stroke="#475569" stroke-width="1" stroke-linecap="round">
    <line x1="560" y1="120" x2="605" y2="72"/>
    <line x1="560" y1="120" x2="595" y2="190"/>
    <line x1="560" y1="120" x2="660" y2="140"/>
    <line x1="605" y1="72"  x2="720" y2="90"/>
    <line x1="660" y1="140" x2="720" y2="90"/>
    <line x1="595" y1="190" x2="710" y2="195"/>
    <line x1="720" y1="90"  x2="775" y2="60"/>
    <line x1="720" y1="90"  x2="775" y2="155"/>
    <line x1="775" y1="60"  x2="840" y2="110"/>
    <line x1="775" y1="60"  x2="920" y2="75"/>
    <line x1="775" y1="155" x2="870" y2="175"/>
    <line x1="840" y1="110" x2="870" y2="175"/>
    <line x1="870" y1="175" x2="840" y2="220"/>
    <line x1="870" y1="175" x2="925" y2="145"/>
    <line x1="870" y1="175" x2="925" y2="215"/>
    <line x1="920" y1="75"  x2="925" y2="145"/>
  </g>

  <!-- Network pattern  dashed connections -->
  <g stroke="#334155" stroke-width="1" stroke-linecap="round" stroke-dasharray="5 4">
    <line x1="710" y1="195" x2="775" y2="155"/>
    <line x1="840" y1="220" x2="925" y2="215"/>
    <line x1="595" y1="190" x2="660" y2="140"/>
  </g>

  <!-- Network pattern  hub nodes -->
  <circle cx="560" cy="120" r="5.5" fill="#94A3B8"/>
  <circle cx="720" cy="90"  r="7"   fill="#94A3B8"/>
  <circle cx="720" cy="90"  r="12"  stroke="#475569" stroke-width="1" fill="none"/>
  <circle cx="870" cy="175" r="5.5" fill="#94A3B8"/>

  <!-- Network pattern  small nodes -->
  <circle cx="605" cy="72"  r="3"   fill="#64748B"/>
  <circle cx="595" cy="190" r="3"   fill="#64748B"/>
  <circle cx="660" cy="140" r="3.5" fill="#64748B"/>
  <circle cx="710" cy="195" r="2.5" fill="#4B5563"/>
  <circle cx="775" cy="60"  r="3"   fill="#64748B"/>
  <circle cx="775" cy="155" r="3.5" fill="#64748B"/>
  <circle cx="840" cy="110" r="3"   fill="#64748B"/>
  <circle cx="840" cy="220" r="2.5" fill="#4B5563"/>
  <circle cx="920" cy="75"  r="3"   fill="#64748B"/>
  <circle cx="925" cy="145" r="3"   fill="#64748B"/>
  <circle cx="925" cy="215" r="2.5" fill="#4B5563"/>
</svg>
